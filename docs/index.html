<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Back Office · Krumook</title>
  <meta name="description" content="Krumook teacher back office — approval queue, products, codes, students, slips" />
  <meta name="theme-color" content="#f7f8fb" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600&family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.2/src/regular/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.2/src/fill/style.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%97%82%EF%B8%8F%3C/text%3E%3C/svg%3E" />
</head>
<body>

  <!-- ============================ LOGIN ============================ -->
  <div class="login-screen" id="loginScreen">
    <form class="login-card" id="loginForm" autocomplete="off">
      <div class="login-logo"><i class="ph ph-chalkboard-teacher"></i></div>
      <div class="login-eyebrow">Krumook</div>
      <div class="login-title">Back Office</div>
      <p class="login-sub">Enter your secret once to access the back office</p>

      <div class="login-error hidden" id="loginError"></div>

      <div class="field hidden" id="apiUrlField">
        <label for="apiUrl">API URL (Apps Script)</label>
        <input type="url" id="apiUrl" class="mono" placeholder="https://script.google.com/macros/s/..../exec" inputmode="url" />
        <span class="hint">From Deploy → Web App (not secret)</span>
      </div>

      <div class="field">
        <label for="apiSecret">
          Teacher secret (API_SECRET)
          <button type="button" class="info-btn" id="secretInfoBtn" aria-label="Where does this come from?" aria-expanded="false">i</button>
        </label>
        <div class="info-pop hidden" id="secretInfo">
          <b>Where is this?</b> It is the <b>API_SECRET</b> set in Apps Script
          (Project Settings → Script Properties). Reset it there if needed.
        </div>
        <input type="password" id="apiSecret" placeholder="••••••••••••" />
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn"><i class="ph ph-lock-key-open"></i> Sign in</button>
    </form>
  </div>

  <!-- ============================ APP ============================ -->
  <div class="app-shell hidden" id="appShell">

    <aside class="sidebar">
      <div class="s-brand">
        <div class="brand-mark"><i class="ph ph-chalkboard-teacher"></i></div>
        <div class="brand-text">
          <h1>Back Office</h1>
          <p>Krumook</p>
        </div>
        <button type="button" class="sidebar-toggle" id="sidebarToggle" aria-label="Collapse menu"><i class="ph ph-caret-left"></i></button>
      </div>
      <nav class="s-nav" aria-label="Main menu">
      <button class="nav-item" data-nav="pending" title="Approval queue"><span class="nav-ico"><i class="ph ph-list-checks"></i></span><span class="nav-label">Approval queue</span><span class="badge-dot hidden" data-badge="pending">0</span></button>
      <button class="nav-item" data-nav="products" title="Products"><span class="nav-ico"><i class="ph ph-books"></i></span><span class="nav-label">Products</span></button>
      <button class="nav-item" data-nav="codes" title="Codes"><span class="nav-ico"><i class="ph ph-ticket"></i></span><span class="nav-label">Codes</span></button>
      <button class="nav-item" data-nav="students" title="Students"><span class="nav-ico"><i class="ph ph-graduation-cap"></i></span><span class="nav-label">Students</span></button>
      <button class="nav-item" data-nav="slips" title="Slip review"><span class="nav-ico"><i class="ph ph-credit-card"></i></span><span class="nav-label">Slip review</span><span class="badge-dot hidden" data-badge="slips">0</span></button>
      </nav>
      <div class="s-foot">
        <button class="btn btn-ghost btn-sm btn-block" id="logoutBtnDesk"><i class="ph ph-sign-out"></i> <span class="nav-label">Sign out</span></button>
      </div>
    </aside>

    <div>
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark"><i class="ph ph-chalkboard-teacher"></i></div>
          <div class="brand-text">
            <h1>Back Office</h1>
            <p>Krumook</p>
          </div>
        </div>
        <div class="topbar-spacer"></div>
        <button class="icon-btn" id="refreshBtn" title="Refresh" aria-label="Refresh"><i class="ph ph-arrows-clockwise"></i></button>
        <button class="icon-btn" id="logoutBtn" title="Sign out" aria-label="Sign out"><i class="ph ph-sign-out"></i></button>
      </header>

      <main class="main" id="view"></main>
    </div>

    <nav class="bottom-nav" aria-label="Main menu">
      <button class="nav-item" data-nav="pending"><span class="nav-ico"><i class="ph ph-list-checks"></i></span><span>Queue</span><span class="badge-dot hidden" data-badge="pending">0</span></button>
      <button class="nav-item" data-nav="products"><span class="nav-ico"><i class="ph ph-books"></i></span><span>Products</span></button>
      <button class="nav-item" data-nav="codes"><span class="nav-ico"><i class="ph ph-ticket"></i></span><span>Codes</span></button>
      <button class="nav-item" data-nav="students"><span class="nav-ico"><i class="ph ph-graduation-cap"></i></span><span>Students</span></button>
      <button class="nav-item" data-nav="slips"><span class="nav-ico"><i class="ph ph-credit-card"></i></span><span>Slips</span><span class="badge-dot hidden" data-badge="slips">0</span></button>
    </nav>
  </div>

  <div class="toast-wrap" id="toastWrap"></div>
  <div id="modalRoot"></div>

  <script src="app.js"></script>
</body>
</html>
